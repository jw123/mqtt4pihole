# Sample dnsrecords.yaml. Copy to dnsrecords.yaml in the working
# directory to use.

# A records. Each top-level entry is ONE Home Assistant switch that
# controls the A record together with any associated CNAMEs pointing
# at its domain.
dnsrecords:
  an.example.domain:
    ip: 127.0.0.1
    cnamerecords:
      - alt1.domain.com
      - alt2.domain.com
      - alt3.domain.com
      - alt4.domain.com
    startstate: off            # Optional - default = on
  a.simple.domain: 127.0.0.1   # Shorthand: ip only, no associated cnames
  a.lookup.domain:
    ip: lookup                 # 'lookup' resolves the IP via DNS at startup
    cnamerecords:
      - domain.to.lookup.com

# Standalone CNAME records. Each top-level entry is ONE switch that
# maps a source domain to a target.
cnamerecords:
  source.domain.com: localhost   # Shorthand: target only
  different.domain.com:
    target: localhost
    startstate: off
